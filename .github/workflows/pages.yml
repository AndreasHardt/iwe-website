name: Website erstellen und veröffentlichen

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: Website aus CMS-Inhalten erzeugen
        env:
          SVELTIA_AUTH_URL: ${{ vars.SVELTIA_AUTH_URL }}
        run: python build.py

      - name: Website-Artefakt hochladen
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
